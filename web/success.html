<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Casago - Payment Success</title>
</head>
<body>
  <h2 id="status">Processing your ride...</h2>
  <pre id="details"></pre>

  <script>
    const API_BASE_URL = "https://casago-api.azurewebsites.net";

    const statusEl = document.getElementById("status");
    const detailsEl = document.getElementById("details");

    const sessionId = new URLSearchParams(location.search).get("session_id");

    async function run() {
      if (!sessionId) {
        statusEl.textContent = "Missing session_id";
        return;
      }

      try {
        const r = await fetch(`${API_BASE_URL}/after-payment`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId })
        });

        const txt = await r.text();
        if (!r.ok) throw new Error(txt);

        statusEl.textContent = "Payment confirmed. You can return to the app.";
        detailsEl.textContent = txt;
      } catch (e) {
        statusEl.textContent = "Error confirming payment";
        detailsEl.textContent = String(e);
      }
    }

    run();
  </script>
</body>
</html>
